{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="bg-white p-6 rounded shadow">

<form method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required
        class="w-full border p-2 mb-3">

    <input
        type="email"
        name="email"
        placeholder="Email"
        required
        class="w-full border p-2 mb-3">

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
        class="w-full border p-2 mb-3">

    <button
        class="bg-blue-600 text-white px-4 py-2 rounded">

        Register

    </button>

</form>

</div>

{% endblock %}
