{% extends "base.html" %}

{% block title %}
Add Recipe
{% endblock %}

{% block content %}

<div class="bg-white p-6 rounded shadow">

    <h2 class="text-2xl font-bold mb-4">
        Add Recipe
    </h2>

    <form method="POST">

        <div class="mb-4">

            <label class="block mb-2">
                Title
            </label>

            <input
                type="text"
                name="title"
                required
                class="w-full border p-2 rounded">

        </div>

        <div class="mb-4">

            <label class="block mb-2">
                Category
            </label>

            <select
                name="category_id"
                required
                class="w-full border p-2 rounded">

                <option value="">
                    Select Category
                </option>

                {% for category in categories %}

                    <option
                        value="{{ category.category_id }}">

                        {{ category.category_name }}

                    </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-4">

            <label class="block mb-2">
                Description
            </label>

            <textarea
                name="description"
                rows="5"
                class="w-full border p-2 rounded"></textarea>

        </div>

        <button
            type="submit"
            class="bg-blue-600 text-white px-4 py-2 rounded">

            Save Recipe

        </button>

    </form>

</div>

{% endblock %}
