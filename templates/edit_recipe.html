{% extends "base.html" %}

{% block content %}

<h2 class="text-2xl font-bold mb-4">Edit Recipe</h2>

<form method="POST" action="/recipes/update/{{ recipe.recipe_id }}">

    <input type="text"
           name="title"
           value="{{ recipe.title }}"
           class="w-full border p-2 mb-3 rounded">

    <select name="category_id"
            class="w-full border p-2 mb-3 rounded">

        {% for category in categories %}
            <option value="{{ category.category_id }}"
                {% if category.category_id == recipe.category_id %}selected{% endif %}>
                {{ category.category_name }}
            </option>
        {% endfor %}

    </select>

    <textarea name="description"
              class="w-full border p-2 mb-3 rounded">{{ recipe.description }}</textarea>

    <button class="bg-blue-600 text-white px-4 py-2 rounded">
        Update Recipe
    </button>

</form>

{% endblock %}
